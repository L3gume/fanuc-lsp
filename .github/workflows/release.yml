name: Release

# Publishes a single-file, self-contained FanucLSP.exe whenever a version tag
# (e.g. v1.2.3) is pushed. MinVer derives the assembly version from that tag.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # required to create the GitHub Release

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history + tags so MinVer can derive the version

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore FanucLSP.slnx

      - name: Build
        run: dotnet build FanucLSP.slnx -c Release --no-restore

      - name: Test
        run: dotnet test FanucLSP.slnx -c Release --no-build

      - name: Publish single-file exe
        run: dotnet publish FanucLSP/FanucLSP.csproj -c Release -p:PublishProfile=win-x64 --no-restore

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >
          gh release create "${{ github.ref_name }}"
          "FanucLSP/bin/Release/net10.0/win-x64/publish/FanucLSP.exe#FanucLSP-${{ github.ref_name }}.exe"
          --title "${{ github.ref_name }}"
          --generate-notes